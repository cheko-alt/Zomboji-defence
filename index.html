<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>🍔 Tower Defense</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<canvas id="game" width="800" height="480"></canvas>

<div id="ui">
    <div>Волна: <span id="wave">1</span></div>
    <div>🍔: <span id="money">250</span></div>
    <div>❤️: <span id="lives">20</span></div>
    <div>Множитель: <span id="multi">1</span></div>
</div>

<div id="menu">
    <button onclick="buyTurret()">Купить турель (<span id="buyPrice">100</span>🍔)</button>
    <button onclick="upgradeTurret()">Прокачать одну (<span id="upPrice">80</span>🍔)</button>
    <button onclick="upgradeAll()">Улучшить ВСЁ (<span id="allPrice">150</span>🍔)</button>
    <button id="nextWaveBtn" onclick="nextWave()">▶ Следующая волна</button>
</div>

<div id="startMenu">
    <h1>🍔 Tower Defense</h1>
    <button class="slot" onclick="startNewGame()">Начать новую игру</button>
    <button class="slot" onclick="continueGame()">Продолжить (слот 1)</button>
    <button class="slot" onclick="showSaveMenu()">Мои сохранения</button>
</div>

<script src="game.js"></script>
</body>
</html>
